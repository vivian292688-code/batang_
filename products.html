<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>商品介紹｜擺渡時光・塘藏故事</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f6f6f4;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #6f4e37;
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    .photo-page {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 16px;
    }

    .photo-page img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 28px;
    }

    .farm-links {
      margin-top: 50px;
      margin-bottom: 40px;
    }

    .farm-links h2 {
      text-align: center;
      color: #5b3f2f;
      font-size: 32px;
      margin-bottom: 32px;
    }

    .farm-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }

    .farm-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transition: 0.3s ease;
    }

    .farm-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }

    .farm-card img {
      width: 100%;
      height: auto;
      display: block;
      margin: 0;
    }

    .farm-card h3 {
      text-align: center;
      color: #5b3f2f;
      font-size: 22px;
      padding: 18px;
      margin: 0;
    }

    footer {
      background: #4a382d;
      color: white;
      text-align: center;
      padding: 28px 20px;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .farm-grid {
        grid-template-columns: 1fr;
      }

      .farm-links h2 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">回首頁 Home</a>
  </nav>

  <main class="photo-page">

    <img src="2.jpg" alt="商品介紹圖片 2">
    <img src="5.jpg" alt="商品介紹圖片 5">
    <img src="6.jpg" alt="商品介紹圖片 6">
    <img src="7.jpg" alt="商品介紹圖片 7">
    <img src="8.jpg" alt="商品介紹圖片 8">
    <img src="9.jpg" alt="商品介紹圖片 9">
    <img src="10.jpg" alt="商品介紹圖片 10">
    <img src="11.jpg" alt="商品介紹圖片 11">
    <img src="12.jpg" alt="商品介紹圖片 12">

    <section class="farm-links">

      <h2>合作果園資訊</h2>

      <div class="farm-grid">

        <a class="farm-card"
           href="https://dacun-grape.com.tw/"
           target="_blank">

          <img src="自然甜.jpg" alt="自然甜果園">

          <h3>自然甜果園</h3>

        </a>

        <a class="farm-card"
           href="https://tw-grapefarm-chiahe.com/"
           target="_blank">

          <img src="家和.jpg" alt="家和果園">

          <h3>家和果園</h3>

        </a>

        <a class="farm-card"
           href="https://www.facebook.com/dahingrape/"
           target="_blank">

          <img src="大新.jpg" alt="大新巨峰葡萄">

          <h3>大新巨峰葡萄</h3>

        </a>

        <a class="farm-card"
           href="https://www.facebook.com/p/%E4%B8%89%E8%89%B2%E5%B1%8B%E8%91%A1%E8%90%84%E6%9E%9C%E5%9C%92-1000893597051/"
           target="_blank">

          <img src="三色屋.jpg" alt="三色屋葡萄園">

          <h3>三色屋葡萄園</h3>

        </a>

      </div>

    </section>

  </main>

  <footer>
    <p>© 2026 擺塘村數位導覽平台 Batang Village Digital Guide</p>
  </footer>

</body>
</html>
